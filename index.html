<!DOCTYPE html>
<html>
<head>
  <style>
    body { font-family: sans-serif; padding: 20px; background: #1e1e1e; color: #d4d4d4; }
    input { width: 70%; padding: 8px; background: #333; color: white; border: 1px solid #555; }
    button { padding: 8px 15px; cursor: pointer; background: #007acc; color: white; border: none; }
    pre { background: #000; padding: 15px; border-radius: 5px; overflow-x: auto; font-family: 'Consolas', monospace; }
  </style>
</head>
<body>
  <h2>🌲 File Tree Explorer</h2>
  <input type="text" id="pathInput" placeholder="Enter folder path (e.g. C:\Users\Jay\Desktop)">
  <button onclick="generate()">Generate</button>
  <pre id="output">Output will appear here...</pre>

  <script>
    const { ipcRenderer } = require('electron');
    function generate() {
      const path = document.getElementById('pathInput').value;
      if(!path) return alert("Please enter a path!");
      ipcRenderer.send('get-tree', path);
    }
    ipcRenderer.on('tree-result', (event, data) => {
      document.getElementById('output').textContent = data;
    });
  </script>
</body>
</html>
